<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Datang</title>
    <style>
        /* Gaya untuk halaman */
        body { 
            background-color: #8552b5; 
            color: #3e2723; /* Warna teks abu-abu gelap */
            font-family: 'Arial', sans-serif; /* Font yang bersih dan modern */
            text-align: center; /* Teks ditengah */
            padding: 50px; /* Padding di sekeliling konten */
        }

        h1 {
            font-size: 3rem; /* Ukuran font besar untuk judul */
            color: #4d0368; /* Warna merah cerah untuk judul */
            margin-bottom: 20px; /* Jarak bawah judul */
        }

        h3 {
            font-size: 1.5rem; /* Ukuran font lebih kecil untuk subjudul */
            color: #4d0368; /* Warna biru cerah untuk subjudul */
            margin-bottom: 40px; /* Jarak bawah subjudul */
        }

        /* Tambahan gaya untuk tombol */
        .welcome-button {
            background-color: #38acaa; /* Warna hijau cerah */
            color: white; /* Teks putih */
            padding: 10px 20px; /* Padding dalam tombol */
            border: none; /* Tanpa border */
            border-radius: 5px; /* Sudut membulat */
            font-size: 1rem; /* Ukuran font tombol */
            cursor: pointer; /* Mengubah kursor saat hover */
            text-decoration: none; /* Tanpa garis bawah */
            display: inline-block; /* Mengatur agar tombol ditampilkan sebagai blok inline */
            margin-top: 20px; /* Jarak atas tombol */
        }

        .welcome-button:hover {
            background-color: #388e3c; /* Warna hijau lebih gelap saat hover */
        }
    </style>
</head>
<body>
    <h1>SELAMAT DATANG!</h1>
    <h3>Terimakasih telah bergabung di website kami. Media belajar kita bersama</h3>
    <a href="index.html" class="welcome-button">Kembali ke Beranda</a>
</body>
</html>
